<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wallpaper palette gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: 14px;
    background: #111;
    color: #ccc;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── left: grid ── */
  #sidebar {
    width: 320px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2a2a;
    overflow: hidden;
  }

  #controls {
    padding: 10px 12px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #controls h1 { font-size: 13px; font-weight: 600; color: #eee; }

  #search {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    padding: 5px 8px;
    font-size: 12px;
    width: 100%;
  }

  #sort-row {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 11px;
    color: #888;
  }

  #sort-row select {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    padding: 3px 6px;
    font-size: 11px;
  }

  #stats { font-size: 11px; color: #666; }

  #grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    align-content: start;
  }

  .thumb {
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    position: relative;
    aspect-ratio: 16/9;
    background: #1a1a1a;
  }

  .thumb:hover { border-color: #555; }
  .thumb.active { border-color: #7a9fff; }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb .badge {
    position: absolute;
    bottom: 3px;
    right: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(0,0,0,0.7);
  }

  .badge.high   { color: #7dde92; }
  .badge.mid    { color: #f0b040; }
  .badge.low    { color: #e06060; }
  .badge.error  { color: #999; }

  .thumb .mirror-badge {
    position: absolute;
    top: 3px;
    left: 4px;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    background: rgba(80,100,180,0.85);
    color: #cce;
  }

  /* ── right: detail ── */
  #detail {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #detail.empty {
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 13px;
  }

  #detail-img {
    width: 100%;
    max-width: 900px;
    border-radius: 6px;
    display: block;
  }

  #detail-name {
    font-size: 15px;
    font-weight: 600;
    color: #eee;
  }

  #detail-meta {
    font-size: 12px;
    color: #666;
    display: flex;
    gap: 16px;
  }

  #detail-meta span { white-space: nowrap; }

  #palette-strip {
    height: 40px;
    border-radius: 4px;
    width: 100%;
    max-width: 900px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-bottom: 6px;
  }

  /* histogram */
  #hist-wrap {
    max-width: 900px;
  }

  #hist-canvas {
    width: 100%;
    height: 80px;
    display: block;
    border-radius: 4px;
    background: #1a1a1a;
  }

  #error-box {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 11px;
    color: #c88;
    white-space: pre-wrap;
    font-family: monospace;
    max-width: 900px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="controls">
    <h1>Palette gallery</h1>
    <input id="search" type="search" placeholder="Filter by name…">
    <div id="sort-row">
      <span>Sort:</span>
      <select id="sort">
        <option value="name">Name</option>
        <option value="cov-asc">Coverage ↑</option>
        <option value="cov-desc">Coverage ↓</option>
      </select>
    </div>
    <div id="stats"></div>
  </div>
  <div id="grid"></div>
</div>

<div id="detail" class="empty">
  <span>Select a wallpaper</span>
</div>

<script>
// ── data ──────────────────────────────────────────────────────────────────────
// Adjust this path to wherever build_wallpaper_manifest.py writes its output.
const MANIFEST_PATH = "../../data/palette_viz/test/manifest.json";

let allEntries = [];
let activeIndex = null;

async function loadManifest() {
  let manifest;
  try {
    const r = await fetch(MANIFEST_PATH);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    manifest = await r.json();
  } catch(e) {
    showLoadError(e);
    return;
  }
  // Support both build_wallpaper_manifest.py schema (entries) and
  // test_wallpaper_extraction.py schema (images, closure, coverage 0-100)
  const rawEntries = manifest.entries ?? manifest.images ?? [];
  const total = manifest.total ?? manifest.n ?? rawEntries.length;
  const errCount = manifest.errors ?? rawEntries.filter(e => e.error).length;
  const baseDir = MANIFEST_PATH.replace(/manifest\.json$/, "");
  // Convert absolute repo paths to relative (test scripts emit absolute Windows paths)
  const relPath = p => {
    if (!p) return p;
    const m = p.replace(/\\/g, '/').match(/\/(data\/.*)$/);
    return m ? '../../' + m[1] : p;
  };
  allEntries = rawEntries.map(e => ({
    name: e.name,
    image: relPath(e.image) ?? `${baseDir}${e.name}.thumb.jpg`,
    palette_json: relPath(e.palette_json) ?? `${baseDir}${e.name}.json`,
    coverage: (e.coverage !== null && e.coverage !== undefined)
      ? (e.coverage > 1 ? e.coverage / 100 : e.coverage)
      : null,
    native: e.native !== undefined
      ? e.native
      : (e.closure === "native" ? true : e.closure != null ? false : null),
    error: e.error ?? null,
  }));
  document.getElementById("stats").textContent = `${total} images · ${errCount} errors`;
  renderGrid();
}

function showLoadError(e) {
  document.getElementById("grid").innerHTML =
    `<div style="grid-column:1/-1;color:#c88;font-size:11px;padding:8px;">
      Failed to load manifest:<br>${e.message}<br><br>
      Run build_wallpaper_manifest.py first.
    </div>`;
}

// ── grid ──────────────────────────────────────────────────────────────────────
function badgeClass(cov) {
  if (cov === null) return "error";
  if (cov >= 0.7) return "high";
  if (cov >= 0.4) return "mid";
  return "low";
}

function filteredSorted() {
  const q = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  let entries = allEntries.filter(e => e.name.toLowerCase().includes(q));
  if (sort === "name") entries.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === "cov-asc") entries.sort((a,b) => (a.coverage??-1)-(b.coverage??-1));
  else entries.sort((a,b) => (b.coverage??-1)-(a.coverage??-1));
  return entries;
}

function renderGrid() {
  const entries = filteredSorted();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  entries.forEach((e, i) => {
    const div = document.createElement("div");
    div.className = "thumb" + (activeIndex === e.name ? " active" : "");
    div.dataset.name = e.name;

    const img = document.createElement("img");
    img.src = e.image;
    img.alt = e.name;
    img.loading = "lazy";
    div.appendChild(img);

    const badge = document.createElement("div");
    badge.className = "badge " + badgeClass(e.coverage);
    badge.textContent = e.coverage !== null ? (e.coverage*100).toFixed(0)+"%" : "err";
    div.appendChild(badge);

    if (e.native === false) {
      const mb = document.createElement("div");
      mb.className = "mirror-badge";
      mb.textContent = "mirror";
      div.appendChild(mb);
    }

    div.addEventListener("click", () => showDetail(e));
    grid.appendChild(div);
  });
}

// ── detail ────────────────────────────────────────────────────────────────────
async function showDetail(entry) {
  activeIndex = entry.name;
  document.querySelectorAll(".thumb").forEach(t =>
    t.classList.toggle("active", t.dataset.name === entry.name));

  const panel = document.getElementById("detail");
  panel.className = "";
  panel.innerHTML = "";

  // name + meta
  const nameEl = document.createElement("div");
  nameEl.id = "detail-name";
  nameEl.textContent = entry.name;
  panel.appendChild(nameEl);

  const metaEl = document.createElement("div");
  metaEl.id = "detail-meta";
  const covText = entry.coverage !== null ? `Coverage: ${(entry.coverage*100).toFixed(1)}%` : "Coverage: —";
  const nativeText = entry.native === true ? "native" : entry.native === false ? "mirror-closed" : "—";
  metaEl.innerHTML = `<span>${covText}</span><span>${nativeText}</span>`;
  panel.appendChild(metaEl);

  // wallpaper image
  const img = document.createElement("img");
  img.id = "detail-img";
  img.src = entry.image;
  img.alt = entry.name;
  panel.appendChild(img);

  if (entry.error) {
    const err = document.createElement("pre");
    err.id = "error-box";
    err.textContent = entry.error;
    panel.appendChild(err);
    return;
  }

  // load palette json
  let palette = null;
  try {
    const r = await fetch(entry.palette_json);
    palette = await r.json();
  } catch(e) {
    const err = document.createElement("pre");
    err.id = "error-box";
    err.textContent = "Could not load palette JSON: " + e.message;
    panel.appendChild(err);
    return;
  }

  // palette strip
  const stripLabel = document.createElement("div");
  stripLabel.className = "section-label";
  stripLabel.textContent = "Extracted palette";
  panel.appendChild(stripLabel);

  const stripCanvas = document.createElement("canvas");
  stripCanvas.id = "palette-strip";
  stripCanvas.height = 40;
  stripCanvas.width = 900;
  panel.appendChild(stripCanvas);
  drawPaletteStrip(stripCanvas, palette.stops);

  // coverage histogram
  const histLabel = document.createElement("div");
  histLabel.className = "section-label";
  histLabel.style.marginTop = "8px";
  histLabel.textContent = "Coverage";
  panel.appendChild(histLabel);

  const histWrap = document.createElement("div");
  histWrap.id = "hist-wrap";
  const histCanvas = document.createElement("canvas");
  histCanvas.id = "hist-canvas";
  histCanvas.width = 900;
  histCanvas.height = 80;
  histWrap.appendChild(histCanvas);
  panel.appendChild(histWrap);
  drawCoverageBar(histCanvas, entry.coverage);
}

// ── drawing ───────────────────────────────────────────────────────────────────
function oklab2rgb(L, a, b) {
  // Ottosson OKLab → linear sRGB → gamma
  const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
  const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
  const s_ = L - 0.0894841775 * a - 1.2914855480 * b;
  const l = l_*l_*l_, m = m_*m_*m_, s = s_*s_*s_;
  const r =  4.0767416621*l - 3.3077115913*m + 0.2309699292*s;
  const g = -1.2684380046*l + 2.6097574011*m - 0.3413193965*s;
  const bv = -0.0041960863*l - 0.7034186147*m + 1.7076147010*s;
  const gc = v => v <= 0.0031308 ? 12.92*v : 1.055*Math.pow(Math.max(v,0),1/2.4)-0.055;
  return [
    Math.round(Math.min(1,Math.max(0,gc(r)))*255),
    Math.round(Math.min(1,Math.max(0,gc(g)))*255),
    Math.round(Math.min(1,Math.max(0,gc(bv)))*255),
  ];
}

function drawPaletteStrip(canvas, stops) {
  // stops: [[t, [r,g,b]], ...] sRGB8 from to_colormap(), or {t,L,a,b} OKLab dicts
  if (!stops || stops.length === 0) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  for (const s of stops) {
    let rgb, t;
    if (Array.isArray(s)) {
      t = s[0];
      rgb = s[1];
    } else {
      t = s.t ?? s.position ?? 0;
      rgb = s.rgb ?? oklab2rgb(s.L ?? 0.5, s.a ?? 0, s.b ?? 0);
    }
    grad.addColorStop(Math.min(1, Math.max(0, t)), `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCoverageBar(canvas, coverage) {
  if (coverage === null) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(0, 0, W, H);

  const covW = Math.round(coverage * W);
  // covered portion
  ctx.fillStyle = "#3a7a50";
  ctx.fillRect(0, H*0.2, covW, H*0.6);
  // uncovered (magenta proxy)
  ctx.fillStyle = "#7a3060";
  ctx.fillRect(covW, H*0.2, W-covW, H*0.6);

  // label
  ctx.fillStyle = "#ccc";
  ctx.font = "12px system-ui";
  ctx.textAlign = "left";
  ctx.fillText(`${(coverage*100).toFixed(1)}% covered`, 8, H-8);
  ctx.textAlign = "right";
  ctx.fillText(`${(100-coverage*100).toFixed(1)}% uncovered`, W-8, H-8);
}

// ── events ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", renderGrid);
document.getElementById("sort").addEventListener("change", renderGrid);

loadManifest();
</script>
</body>
</html>
