function strip(g){
 const n=g.length, s=g.map((c,i)=>`rgb(${c[0]},${c[1]},${c[2]}) ${(100*i/(n-1)).toFixed(1)}%`).join(',');
 return `linear-gradient(90deg,${s})`;
}
const meta=document.getElementById('meta');
meta.innerHTML=`<b>${P.n}</b> extracted palettes (raw output of extract_palette_cycles over the 746-image wallpaper harvest; `+
 `256 stops, sRGB, cyclic). Gate-rejected (extent&lt;0.05 ∨ arclen&lt;0.30): <b>${P.n_rejected}</b> (survivors ${P.n-P.n_rejected}). `+
 `Near-dup to existing pool (${P.pool_size} lib palettes, dist&lt;${P.dup_thresh}): <b>${P.n_near_dup}</b>. `+
 `Net-new population (survivor ∧ ¬near_dup): <b>${P.n_netnew}</b>; the <b>top-30%-net-new</b> line (${P.cut_idx} palettes, `+
 `composite ≥ ${P.cut_score}) is drawn below.<br>`+
 `<b>Composite (primary)</b> = mean( r(extent), r(arclen), r(coverage), 1−r(seam_cycle), 1−r(max_stop_step) ), r=rank-norm∈[0,1]. `+
 `A starting proposal to tune by eye — NOT settled. `+
 `<b>Coverage caveat:</b> per PALETTE_EXTRACTION.md coverage is a rope-vs-sheet honesty signal (legitimately low on rich images), not a pure quality axis — the "no coverage" sort is provided to test its influence. `+
 `<b>Near-dup caveat:</b> palette_distance is per-anchor L2 (shift-variant for cyclic); floor is ~0.052 and the nearest matches are generic low-chroma library greys, not confirmed recolors — the corpus reads as essentially all net-new.`;

const AX=P.dist, keys=Object.keys(AX);
let th='<tr><th>axis</th><th>min</th><th>p25</th><th>p50</th><th>p75</th><th>max</th></tr>';
for(const k of keys){const d=AX[k];th+=`<tr><td>${k}</td><td>${d.p0}</td><td>${d.p25}</td><td>${d.p50}</td><td>${d.p75}</td><td>${d.p100}</td></tr>`;}
th+=`<tr><td>composite</td><td>${P.comp_dist.p0.toFixed(3)}</td><td>${P.comp_dist.p25.toFixed(3)}</td><td>${P.comp_dist.p50.toFixed(3)}</td><td>${P.comp_dist.p75.toFixed(3)}</td><td>${P.comp_dist.p100.toFixed(3)}</td></tr>`;
th+=`<tr><td>min_dist_to_existing</td><td>${P.mindist_dist.p0}</td><td>${P.mindist_dist.p25}</td><td>${P.mindist_dist.p50}</td><td>${P.mindist_dist.p75}</td><td>${P.mindist_dist.p100}</td></tr>`;
document.getElementById('stats').innerHTML=th;

const root=document.getElementById('root');
function render(){
 const sort=document.querySelector('input[name=sort]:checked').value;
 const hideRej=document.getElementById('hideRej').checked;
 const hideDup=document.getElementById('hideDup').checked;
 let rows=P.rows.filter(r=>!(hideRej&&r.rejected)&&!(hideDup&&r.near_dup));
 const asc=(sort==='min_dist');
 rows=rows.slice().sort((a,b)=>asc?a[sort]-b[sort]:b[sort]-a[sort]);
 // net-new rank position for the cut line (only meaningful on composite sort)
 let netnew=0; const cut=P.cut_idx;
 let html='';
 for(const r of rows){
  const isNet=!r.rejected&&!r.near_dup;
  if(sort==='composite'&&isNet){netnew++; if(netnew===cut+1) html+=`<div class=cutline>— top-30%-net-new cut (${cut} palettes above) —</div>`;}
  const tags=(r.cycle_label==='native'?'<span class="tag native">native</span>':'<span class="tag seqt">seq</span>')
   +(r.near_dup?'<span class="tag dup">near-dup</span>':'')
   +(r.rejected?`<span class="tag rej">gate:${r.gate_flags.join(',')}</span>`:'');
  html+=`<div class=row>`
   +`<span class=rk>${r.rank}</span>`
   +`<span class=sc>${sort==='min_dist'?r.min_dist.toFixed(3):r[sort].toFixed(3)}</span>`
   +`<span class=strip style="background:${strip(r.grad)}"></span>`
   +`<span class=ax>cov <b>${r.coverage.toFixed(2)}</b> ext <b>${r.extent.toFixed(2)}</b> arc <b>${r.arclen.toFixed(1)}</b> `
   +`seam <b>${r.seam_cycle.toFixed(2)}</b> rough <b>${r.roughness.toFixed(3)}</b> d <b>${r.min_dist.toFixed(2)}</b></span>`
   +`<span class=nm title="${r.name} → ${r.nearest}">${r.name}</span>${tags}</div>`;
 }
 root.innerHTML=html;
}
document.querySelectorAll('input').forEach(el=>el.addEventListener('change',render));
