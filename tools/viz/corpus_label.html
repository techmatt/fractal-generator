<!doctype html><html><head><meta charset="utf-8"><title>corpus label — 1/2/3</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{font:13px/1.5 ui-monospace,Consolas,monospace;background:#0e0f13;color:#ccc;margin:0;padding:0}
header{position:sticky;top:0;background:#12141a;border-bottom:1px solid #23252e;padding:10px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;z-index:5}
h1{font-size:15px;margin:0;color:#eee}
.batch{color:#7a9; font-size:12px}
.spacer{flex:1}
button{font:inherit;background:#1c1f29;color:#ccc;border:1px solid #2c2f3a;border-radius:5px;padding:5px 10px;cursor:pointer}
button:hover{background:#262a36}
.counts{color:#888;font-size:12px}
.counts b{color:#cdd}
.bad{color:#e06a6a}.mid{color:#e0b24a}.good{color:#5ec07a}
main{display:flex;gap:18px;padding:18px;align-items:flex-start}
#stage{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:10px}
#stage img{width:100%;height:auto;max-height:86vh;object-fit:contain;border:1px solid #23252e;border-radius:6px;background:#000}
.meta{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;color:#777;font-size:11px}
.meta .cap{border:1px solid #23252e;border-radius:4px;padding:1px 7px}
.cur-score{font-size:12px}
.score-btns{display:flex;gap:10px;margin-top:2px}
.score-btns button{font-size:15px;padding:8px 18px}
.sb1{border-color:#5a2c2c}.sb2{border-color:#5a4a2c}.sb3{border-color:#2c5a3a}
aside{width:340px;flex:none;max-height:86vh;overflow:auto;border:1px solid #1c1f29;border-radius:6px;padding:6px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cell{position:relative;border:2px solid transparent;border-radius:3px;cursor:pointer;aspect-ratio:16/9;background:#000;overflow:hidden}
.cell img{width:100%;height:100%;object-fit:cover;display:block}
.cell.cur{border-color:#6a8fd0}
.cell .tag{position:absolute;right:1px;bottom:0;font-size:10px;padding:0 3px;border-radius:2px;background:rgba(0,0,0,.6)}
.cell.s1 .tag{color:#e06a6a}.cell.s2 .tag{color:#e0b24a}.cell.s3 .tag{color:#5ec07a}
.cell.s1{border-color:#5a2c2c}.cell.s2{border-color:#5a4a2c}.cell.s3{border-color:#2c5a3a}
.hint{color:#777;font-size:11px;max-width:560px;text-align:center}
#stage img{cursor:zoom-in}
#loader{padding:30px;max-width:680px}
input[type=file]{font:inherit}
code{color:#9bb}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out;flex-direction:column;gap:10px}
#lightbox img{max-width:96vw;max-height:88vh;border:1px solid #333}
#lightbox .lbcap{color:#aaa;font-size:12px;text-align:center;max-width:90vw}
</style></head><body>
<header>
  <h1>corpus label</h1>
  <span class="batch" id="batch-label"></span>
  <span class="counts" id="counts"></span>
  <span class="spacer"></span>
  <button id="next-unscored">next unlabeled (u)</button>
  <button id="export">export scores.json</button>
  <label class="cap" style="cursor:pointer;color:#ccc">load scores<input id="load-scores" type="file" accept=".json" hidden></label>
</header>

<div id="loader">
  <p>Loading <code id="images-url"></code> …</p>
  <p class="hint" id="loader-msg"></p>
  <p>If it didn't load (opened via <code>file://</code> with fetch blocked), pick the batch's <code>images.jsonl</code> manually:</p>
  <input id="load-images" type="file" accept=".jsonl,.json">
</div>

<main id="app" style="display:none">
  <div id="stage">
    <img id="cur-img" alt="">
    <div class="meta">
      <span class="cap" id="cap-loc"></span>
      <span class="cap" id="cap-prov"></span>
      <span class="cap" id="cap-comp"></span>
      <span class="cap" id="cap-pal"></span>
      <span class="cap" id="cap-occ"></span>
      <span class="cap" id="cap-v2"></span>
      <span class="cap" id="cap-role"></span>
      <span class="cur-score" id="cur-score"></span>
    </div>
    <div class="score-btns">
      <button class="sb1" data-s="1">1 · bad</button>
      <button class="sb2" data-s="2">2 · okay</button>
      <button class="sb3" data-s="3">3 · good</button>
    </div>
    <div class="hint">does <b>this crop</b> work as a wallpaper · keys: <b>1</b>/<b>2</b>/<b>3</b> label &amp; advance · <b>←</b>/<b>→</b> move · <b>u</b> next unlabeled</div>
  </div>
  <aside><div class="grid" id="overview"></div></aside>
</main>
<div id="lightbox"><img id="lbimg" alt=""><div class="lbcap" id="lbcap"></div></div>

<script>
// --- which batch to label: ?batch=<dir> query param overrides, else this default
//     (a dir under data/label_corpus/batches/) ---
const BATCH_ID=new URLSearchParams(location.search).get('batch')||'2026-07-05_gather_v6';
const ROOT='../../';                 // tools/viz/ -> repo root
const BATCH_DIR='data/label_corpus/batches/'+BATCH_ID;
const IMAGES_URL=ROOT+BATCH_DIR+'/images.jsonl';
const LS_KEY='corpus_label::'+BATCH_ID;   // localStorage is per-batch
const SHUFFLE_SEED=0xC0FFEE;
let ROWS=[];                         // presentation-ordered rows {image_id, render, provenance, label}
let scores=loadScores();             // { image_id: 1|2|3 }
let cur=0;

// the image_id IS the durable identity; the crop lives at crops/<image_id>.jpg
function keyOf(r){ return r.image_id; }
function imgSrc(r){ return ROOT+BATCH_DIR+'/crops/'+r.image_id+'.jpg'; }
function loadScores(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch{return {}} }
function saveScores(){ localStorage.setItem(LS_KEY,JSON.stringify(scores)); }

// seeded PRNG (mulberry32) for reproducible presentation order
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function fscore(r){ const v=r.provenance&&r.provenance.filter_score; return (typeof v==='number')?v:null; }
function buildOrder(rows){
  // v2-pre-scored batches: best-first by P(not-bad) descending (fast rejection at
  // the tail; orders the random_eval reserve). Nulls sink to the bottom.
  if(rows.some(r=>fscore(r)!==null)){
    return rows.slice().sort((a,b)=>{
      const fa=fscore(a), fb=fscore(b);
      if(fa===null&&fb===null) return (a.image_id<b.image_id)?-1:1;
      if(fa===null) return 1; if(fb===null) return -1;
      if(fb!==fa) return fb-fa;
      return (a.image_id<b.image_id)?-1:1;
    });
  }
  // legacy batches (no v2 score): reproducible shuffle + location de-adjacency.
  const rnd=mulberry32(SHUFFLE_SEED);
  const uniq=rows.slice();
  for(let i=uniq.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[uniq[i],uniq[j]]=[uniq[j],uniq[i]];}
  const out=[]; const pool=uniq.slice();
  const di=r=>r.provenance&&r.provenance.draw_index;
  while(pool.length){
    const prev=out.length?di(out[out.length-1]):null;
    let pick=pool.findIndex(c=>di(c)!==prev);
    if(pick<0)pick=0;
    out.push(pool.splice(pick,1)[0]);
  }
  return out;
}

function parseJsonl(text){
  const rows=[];
  for(const line of text.split(/\r?\n/)){
    const t=line.trim(); if(!t)continue;
    try{ rows.push(JSON.parse(t)); }catch(e){ /* skip bad line */ }
  }
  return rows;
}

function init(rows){
  if(!rows.length){ document.getElementById('loader-msg').textContent='images.jsonl has no rows'; return; }
  // seed local scores from any labels already baked into the file (resume across machines)
  for(const r of rows){ const s=r.label&&r.label.score; if(s&&!scores[r.image_id]) scores[r.image_id]=s; }
  ROWS=buildOrder(rows);
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('batch-label').textContent=BATCH_ID;
  buildOverview();
  const u=ROWS.findIndex(r=>!scores[keyOf(r)]);
  cur = u<0?0:u;
  show();
}

function buildOverview(){
  const ov=document.getElementById('overview');
  ov.innerHTML='';
  ROWS.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='cell'; d.dataset.i=i;
    d.innerHTML=`<img loading="lazy" src="${imgSrc(r)}" title="${keyOf(r)}"><span class="tag"></span>`;
    d.onclick=()=>{cur=i;show();};
    ov.appendChild(d);
  });
}

function refreshCell(i){
  const cells=document.getElementById('overview').children;
  const c=cells[i]; if(!c) return;
  const s=scores[keyOf(ROWS[i])];
  c.className='cell'+(s?(' s'+s):'')+(i===cur?' cur':'');
  c.querySelector('.tag').textContent=s||'';
}

function refreshCounts(){
  let n1=0,n2=0,n3=0;
  for(const r of ROWS){const s=scores[keyOf(r)]; if(s===1)n1++;else if(s===2)n2++;else if(s===3)n3++;}
  const done=n1+n2+n3;
  document.getElementById('counts').innerHTML=
    `<b>${done}/${ROWS.length}</b> labeled &nbsp; `+
    `<span class="bad">${n1}·bad</span> / <span class="mid">${n2}·okay</span> / <span class="good">${n3}·good</span>`;
}

function show(){
  const r=ROWS[cur], rd=r.render||{}, pv=r.provenance||{};
  document.getElementById('cur-img').src=imgSrc(r);
  document.getElementById('cur-img').alt=keyOf(r);
  document.getElementById('cap-loc').textContent=`${cur+1}/${ROWS.length} · ${r.image_id}`;
  const prov=[pv.root_src,pv.branch,(pv.depth!=null?('d'+pv.depth):null)].filter(Boolean).join(' ');
  document.getElementById('cap-prov').textContent=prov||'—';
  document.getElementById('cap-comp').textContent=rd.composition||'';
  document.getElementById('cap-pal').textContent=rd.palette||'';
  document.getElementById('cap-occ').textContent=(pv.occupancy!=null)?('occ '+(+pv.occupancy).toFixed(3)):'occ ?';
  const v2=document.getElementById('cap-v2'), fs=fscore(r);
  if(fs!==null){
    const ec=pv.v2_est_class, lbl={1:'bad',2:'okay',3:'good'};
    v2.textContent='v2 P(not-bad) '+fs.toFixed(3)+(ec?(' · est '+ec+'·'+(lbl[ec]||'')):'');
    v2.style.color = fs>=0.5 ? '#5ec07a' : '#e0b24a';
  } else { v2.textContent=''; v2.style.color=''; }
  const role=document.getElementById('cap-role');
  role.textContent=pv.selection_role||'';
  role.style.color = pv.selection_role==='random_eval' ? '#6a8fd0' : '#777';
  if(lbOpen)syncLightbox();
  const s=scores[keyOf(r)];
  const lbl={1:'bad',2:'okay',3:'good'};
  const sc=document.getElementById('cur-score');
  sc.textContent=s?('label: '+s+' · '+lbl[s]):'unlabeled';
  sc.className='cur-score'+(s?(' '+['','bad','mid','good'][s]):'');
  [...document.getElementById('overview').children].forEach((c,i)=>refreshCell(i));
  document.getElementById('overview').children[cur]?.scrollIntoView({block:'nearest'});
  refreshCounts();
}

function setScore(s){
  scores[keyOf(ROWS[cur])]=s; saveScores();
  refreshCell(cur); refreshCounts();
  if(cur<ROWS.length-1){cur++;show();} else {show();}
}
function move(d){ cur=(cur+d+ROWS.length)%ROWS.length; show(); }
function nextUnscored(){
  for(let k=1;k<=ROWS.length;k++){const i=(cur+k)%ROWS.length; if(!scores[keyOf(ROWS[i])]){cur=i;show();return;}}
}

let lbOpen=false;
function syncLightbox(){
  const r=ROWS[cur], rd=r.render||{}, pv=r.provenance||{};
  document.getElementById('lbimg').src=imgSrc(r);
  const lbl={1:'bad',2:'okay',3:'good'}, s=scores[keyOf(r)];
  const fs=fscore(r);
  const v2txt=(fs!==null)?(' · v2 '+fs.toFixed(3)+(pv.v2_est_class?('/est'+pv.v2_est_class):'')):'';
  const roletxt=pv.selection_role?(' · '+pv.selection_role):'';
  document.getElementById('lbcap').textContent=
    `${cur+1}/${ROWS.length} · ${r.image_id} · ${rd.composition||''} · ${rd.palette||''} · occ ${(pv.occupancy!=null)?(+pv.occupancy).toFixed(3):'?'}${v2txt}${roletxt} · ${s?('label '+s+' · '+lbl[s]):'unlabeled'}`;
}
function openLightbox(){ lbOpen=true; syncLightbox(); document.getElementById('lightbox').style.display='flex'; }
function closeLightbox(){ lbOpen=false; document.getElementById('lightbox').style.display='none'; }
document.getElementById('cur-img').onclick=openLightbox;
document.getElementById('lightbox').onclick=closeLightbox;

document.querySelectorAll('.score-btns button').forEach(b=>b.onclick=()=>setScore(+b.dataset.s));
window.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display==='none')return;
  if(e.key==='Escape'){ if(lbOpen)closeLightbox(); return; }
  if(e.key==='1'||e.key==='2'||e.key==='3'){setScore(+e.key);e.preventDefault();}
  else if(e.key==='ArrowRight')move(1);
  else if(e.key==='ArrowLeft')move(-1);
  else if(e.key==='u'||e.key==='U')nextUnscored();
});
document.getElementById('next-unscored').onclick=nextUnscored;

document.getElementById('export').onclick=()=>{
  // export only non-null integer scores, sorted by image_id for stable diffs
  const out={};
  Object.keys(scores).sort().forEach(k=>{ if(scores[k]) out[k]=scores[k]; });
  const blob=new Blob([JSON.stringify(out,null,0)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='scores.json'; a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('load-scores').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    scores=JSON.parse(r.result); saveScores();
    [...document.getElementById('overview').children].forEach((c,i)=>refreshCell(i));
    show();
  }catch(err){alert('bad scores.json: '+err);} };
  r.readAsText(f);
};

document.getElementById('load-images').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{init(parseJsonl(r.result));}catch(err){document.getElementById('loader-msg').textContent='parse error: '+err;} };
  r.readAsText(f);
};

document.getElementById('images-url').textContent=IMAGES_URL;
fetch(IMAGES_URL).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
  .then(t=>init(parseJsonl(t)))
  .catch(err=>{document.getElementById('loader-msg').textContent='auto-load failed ('+err.message+') — use the picker below.';});
</script>
</body></html>
