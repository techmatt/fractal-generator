<!doctype html><html><head><meta charset="utf-8"><title>palette score — 1/2/3</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{font:13px/1.5 ui-monospace,Consolas,monospace;background:#0e0f13;color:#ccc;margin:0;padding:0}
header{position:sticky;top:0;background:#12141a;border-bottom:1px solid #23252e;padding:10px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;z-index:5}
h1{font-size:15px;margin:0;color:#eee}
.spacer{flex:1}
button{font:inherit;background:#1c1f29;color:#ccc;border:1px solid #2c2f3a;border-radius:5px;padding:5px 10px;cursor:pointer}
button:hover{background:#262a36}
.counts{color:#888;font-size:12px}
.counts b{color:#cdd}
.bad{color:#e06a6a}.mid{color:#e0b24a}.good{color:#5ec07a}
main{display:flex;gap:18px;padding:18px;align-items:flex-start}
#stage{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:10px}
#stage img{max-width:100%;max-height:72vh;border:1px solid #23252e;border-radius:6px;background:#000}
.meta{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
.nm{font-size:16px;color:#eee}
.flag{font-size:11px;color:#888;border:1px solid #2c2f3a;border-radius:4px;padding:1px 6px}
.score-btns{display:flex;gap:10px;margin-top:4px}
.score-btns button{font-size:15px;padding:8px 18px}
.sb1{border-color:#5a2c2c}.sb2{border-color:#5a4a2c}.sb3{border-color:#2c5a3a}
.cur-score{font-size:12px;color:#888}
aside{width:300px;flex:none;max-height:84vh;overflow:auto;border:1px solid #1c1f29;border-radius:6px;padding:6px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.cell{position:relative;border:2px solid transparent;border-radius:3px;cursor:pointer;aspect-ratio:16/9;background:#000;overflow:hidden}
.cell img{width:100%;height:100%;object-fit:cover;display:block}
.cell.cur{border-color:#6a8fd0}
.cell .tag{position:absolute;right:1px;bottom:0;font-size:10px;padding:0 3px;border-radius:2px;background:rgba(0,0,0,.6)}
.cell.s1 .tag{color:#e06a6a}.cell.s2 .tag{color:#e0b24a}.cell.s3 .tag{color:#5ec07a}
.cell.s1{border-color:#5a2c2c}.cell.s2{border-color:#5a4a2c}.cell.s3{border-color:#2c5a3a}
.hint{color:#777;font-size:11px;max-width:560px;text-align:center}
#loader{padding:30px;max-width:640px}
input[type=file]{font:inherit}
code{color:#9bb}
</style></head><body>
<header>
  <h1>palette score</h1>
  <span class="counts" id="counts"></span>
  <span class="spacer"></span>
  <button id="next-unscored">next unscored (u)</button>
  <button id="export">export scores.json</button>
  <label class="flag" style="cursor:pointer">load scores.json<input id="load-scores" type="file" accept=".json" hidden></label>
</header>

<div id="loader">
  <p>Loading <code>../../data/palette_score/manifest.json</code> …</p>
  <p class="hint" id="loader-msg"></p>
  <p>If it didn't load (opened via <code>file://</code> with fetch blocked), pick the manifest manually:</p>
  <input id="load-manifest" type="file" accept=".json">
</div>

<main id="app" style="display:none">
  <div id="stage">
    <img id="cur-img" alt="">
    <div class="meta">
      <span class="nm" id="cur-name"></span>
      <span class="flag" id="cur-mirror"></span>
      <span class="flag" id="cur-cycle"></span>
      <span class="cur-score" id="cur-score"></span>
    </div>
    <div class="score-btns">
      <button class="sb1" data-s="1">1 · bad</button>
      <button class="sb2" data-s="2">2 · sometimes</button>
      <button class="sb3" data-s="3">3 · good</button>
    </div>
    <div class="hint">keys: <b>1</b>/<b>2</b>/<b>3</b> score &amp; advance · <b>←</b>/<b>→</b> move · <b>u</b> next unscored</div>
  </div>
  <aside><div class="grid" id="overview"></div></aside>
</main>

<script>
const LS_KEY='palette_score_v1';
const ROOT='../../';                 // tools/viz/ -> repo root
const MANIFEST_URL=ROOT+'data/palette_score/manifest.json';
let PAL=[];                          // [{palette,grid_path,mirror_needed,cycle}]
let scores=loadScores();
let cur=0;

function loadScores(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch{return {}} }
function saveScores(){ localStorage.setItem(LS_KEY,JSON.stringify(scores)); }
function imgSrc(row){ return ROOT+String(row.grid_path).replace(/\\/g,'/'); }

function init(manifest){
  PAL = manifest.palettes||[];
  if(!PAL.length){ document.getElementById('loader-msg').textContent='manifest has no palettes[]'; return; }
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='flex';
  buildOverview();
  // start at first unscored, else 0
  const u=PAL.findIndex(p=>!scores[p.palette]);
  cur = u<0?0:u;
  show();
}

function buildOverview(){
  const ov=document.getElementById('overview');
  ov.innerHTML='';
  PAL.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='cell'; d.dataset.i=i;
    d.innerHTML=`<img loading="lazy" src="${imgSrc(p)}" title="${p.palette}"><span class="tag"></span>`;
    d.onclick=()=>{cur=i;show();};
    ov.appendChild(d);
  });
}

function refreshCell(i){
  const cells=document.getElementById('overview').children;
  const c=cells[i]; if(!c) return;
  const s=scores[PAL[i].palette];
  c.className='cell'+(s?(' s'+s):'')+(i===cur?' cur':'');
  c.querySelector('.tag').textContent=s||'';
}

function refreshCounts(){
  let n1=0,n2=0,n3=0;
  for(const p of PAL){const s=scores[p.palette]; if(s===1)n1++;else if(s===2)n2++;else if(s===3)n3++;}
  const done=n1+n2+n3;
  document.getElementById('counts').innerHTML=
    `<b>${done}/${PAL.length}</b> scored &nbsp; `+
    `<span class="bad">${n1}·bad</span> / <span class="mid">${n2}·sometimes</span> / <span class="good">${n3}·good</span>`;
}

function show(){
  const p=PAL[cur];
  document.getElementById('cur-img').src=imgSrc(p);
  document.getElementById('cur-img').alt=p.palette;
  document.getElementById('cur-name').textContent=`${cur+1}/${PAL.length}  ${p.palette}`;
  document.getElementById('cur-mirror').textContent=p.mirror_needed?'mirror':'cyclic';
  document.getElementById('cur-cycle').textContent=p.cycle?('cycle: '+p.cycle):'';
  const s=scores[p.palette];
  const lbl={1:'bad',2:'sometimes',3:'good'};
  document.getElementById('cur-score').textContent=s?('score: '+s+' · '+lbl[s]):'unscored';
  document.getElementById('cur-score').className='cur-score'+(s?(' '+['','bad','mid','good'][s]):'');
  // overview cur highlight
  [...document.getElementById('overview').children].forEach((c,i)=>refreshCell(i));
  document.getElementById('overview').children[cur]?.scrollIntoView({block:'nearest'});
  refreshCounts();
}

function setScore(s){
  const p=PAL[cur];
  scores[p.palette]=s; saveScores();
  refreshCell(cur); refreshCounts();
  // auto-advance to next palette
  if(cur<PAL.length-1){cur++;show();} else {show();}
}
function move(d){ cur=(cur+d+PAL.length)%PAL.length; show(); }
function nextUnscored(){
  for(let k=1;k<=PAL.length;k++){const i=(cur+k)%PAL.length; if(!scores[PAL[i].palette]){cur=i;show();return;}}
}

// score buttons
document.querySelectorAll('.score-btns button').forEach(b=>b.onclick=()=>setScore(+b.dataset.s));
// keyboard
window.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display==='none')return;
  if(e.key==='1'||e.key==='2'||e.key==='3'){setScore(+e.key);e.preventDefault();}
  else if(e.key==='ArrowRight')move(1);
  else if(e.key==='ArrowLeft')move(-1);
  else if(e.key==='u'||e.key==='U')nextUnscored();
});
document.getElementById('next-unscored').onclick=nextUnscored;

// export / load scores
document.getElementById('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(scores,null,0)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='scores.json'; a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('load-scores').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const o=JSON.parse(r.result); scores=o; saveScores();
    [...document.getElementById('overview').children].forEach((c,i)=>refreshCell(i));
    show();
  }catch(err){alert('bad scores.json: '+err);} };
  r.readAsText(f);
};

// manual manifest fallback
document.getElementById('load-manifest').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{init(JSON.parse(r.result));}catch(err){document.getElementById('loader-msg').textContent='parse error: '+err;} };
  r.readAsText(f);
};

// try fetch first
fetch(MANIFEST_URL).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(init)
  .catch(err=>{document.getElementById('loader-msg').textContent='auto-load failed ('+err.message+') — use the picker below.';});
</script>
</body></html>
